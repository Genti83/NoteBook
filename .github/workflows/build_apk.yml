name: Build NoteBook APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Web App
        working-directory: web_source
        run: |
          npm install
          npx vite build
          echo "=== dist/index.html check ==="
          head -3 dist/index.html

      - name: Copy assets
        run: |
          mkdir -p app/src/main/assets/www
          cp -r web_source/dist/. app/src/main/assets/www/
          echo "Assets: $(ls app/src/main/assets/www/)"

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.6
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: NoteBook-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
